{% load static %}

<!-- 1) jQuery (CDN solo para probar; luego lo pasás a static si querés) -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- 2) Select2 (CDN solo para probar) -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.full.min.js"></script>


<button id="add-item-practica" type="button" class="btn btn-primary">Agregar práctica</button>


<form method="post">
  {% csrf_token %}

  <!-- 3) Media de los widgets (DAL agrega sus propios JS) -->
  {{ form.media }}
  {{ formset.media }}

  {{ formset.management_form }}

  <div id="items-practica">
    {% for form in formset %}
      <div class="row practica-item">
        <div class="col-8">
          {{ form.practica.label_tag }}
          {{ form.practica }}
        </div>
        <div class="col-1 d-flex align-items-center">
          {{ form.DELETE }}
        </div>
      </div>
    {% endfor %}
  </div>

  <button id="add-item-practica" type="button" class="btn btn-primary">Agregar práctica</button>

  <template id="empty-form">
    <div class="row practica-item">
      <div class="col-8">
        {{ formset.empty_form.practica.label_tag }}
        {{ formset.empty_form.practica }}
      </div>
      <div class="col-1 d-flex align-items-center">
        <input type="checkbox"
               class="form-check-input"
               name="items_practica-__prefix__-DELETE"
               id="id_items_practica-__prefix__-DELETE">
      </div>
    </div>
  </template>

  <button type="submit" class="btn btn-success mt-3">Guardar</button>
</form>

<script>
  // 4) Forzar la inicialización de DAL con jQuery al cargar:
  jQuery(function($){
    $(document).trigger('autocompleteLightInitialize');
  });
</script>
